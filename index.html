<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Findemo 主页</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: #111b30;
        --text: #eaf1ff;
        --muted: #9fb2d9;
        --accent: #5ea1ff;
        --border: #263a64;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: radial-gradient(circle at top, #132544, var(--bg) 55%);
        color: var(--text);
        min-height: 100vh;
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 34px;
      }
      .desc {
        margin: 0 0 26px;
        color: var(--muted);
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .card {
        display: block;
        text-decoration: none;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--card);
        padding: 16px 18px;
        transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
      }
      .card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        box-shadow: 0 0 0 1px #5ea1ff33, 0 8px 20px #00000044;
      }
      .title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 6px;
      }
      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }
      footer {
        margin-top: 20px;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Findemo</h1>
      <p class="desc">欢迎来到我的 Demo 导航主页，点击下面任一项目进入对应页面。</p>

      <section class="grid">
        <a class="card" href="./FinCausalGraph_demo/" target="_blank" rel="noopener noreferrer">
          <p class="title">FinCausalGraph_demo</p>
          <p class="hint">金融因果图谱演示页面</p>
        </a>

        <a class="card" href="./geo-fin-causal-graph/" target="_blank" rel="noopener noreferrer">
          <p class="title">geo-fin-causal-graph</p>
          <p class="hint">地缘-金融因果图谱页面</p>
        </a>

        <a class="card" href="./TriChain-GeoMarket-demo/" target="_blank" rel="noopener noreferrer">
          <p class="title">TriChain-GeoMarket</p>
          <p class="hint">Tri-Chain 地缘市场联动页面</p>
        </a>
      </section>

      <footer>如果仓库路径不同，只需修改上述链接 href。</footer>
    </main>
  </body>
</html>
